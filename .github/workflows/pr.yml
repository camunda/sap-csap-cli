name: test PRs

on:
  pull_request:
    branches:
      - main

# Set DENO_DIR to an absolute or relative path on the runner.
env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: line endings for windows
        if: runner.os == 'Windows'
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.5

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ hashFiles('deno.lock') }}-${{ runner.os }}-${{ hashFiles('**/*.ts') }}
          restore-keys: |
            deno-${{ hashFiles('deno.lock') }}-${{ runner.os }}-
            deno-${{ runner.os }}-

      - name: Cache npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Pre-cache dependencies (npm packages)
        run: deno cache --reload lib/**/*.ts test/**/*.ts

      - name: set tmp git identifiers (for tests involving git)
        run: |
          git config --global user.name "Camunda gh action"
          git config --global user.email "camunda@noreply.github.local"

      - name: Run tests
        run: deno test test/**/*.ts --allow-all --no-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Run tests (Windows)
      #   if: runner.os == 'Windows'
      #   run: deno test test/**/*.ts --allow-all --no-check --ignore=test/btp-plugin-setup.test.ts
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     RUST_LOG: info
